name: Deploy to GitHub Pages

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# One Pages site, two builds: main is deployed at the site root, dev under /dev/.
# Pushing to either branch rebuilds and redeploys both.
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          path: main
      - uses: actions/checkout@v4
        with:
          ref: dev
          path: dev
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            main/pnpm-lock.yaml
            dev/pnpm-lock.yaml
      - name: Build production (main)
        working-directory: main
        run: |
          pnpm install --frozen-lockfile
          pnpm exec tsc -b
          pnpm exec vite build --base "/${{ github.event.repository.name }}/"
      - name: Build development (dev)
        working-directory: dev
        run: |
          pnpm install --frozen-lockfile
          pnpm exec tsc -b
          pnpm exec vite build --base "/${{ github.event.repository.name }}/dev/"
      - name: Assemble combined site
        run: |
          mkdir site
          cp -r main/dist/. site/
          mkdir -p site/dev
          cp -r dev/dist/. site/dev/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
