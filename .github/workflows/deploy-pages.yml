name: Deploy to GitHub Pages

on:
  push:
    branches: [main, dev, ryan]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# One Pages site, three sibling installs: main → /app/ (production),
# dev → /dev/ (development), ryan → /ryan/ (personal App offshoot).
# They must not nest — a PWA scoped to /MartinOverdrive/ would own the others
# and block installing more than one on a phone. Root / redirects to /app/ and
# retires the old root-scoped service worker.
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          path: main
      - uses: actions/checkout@v4
        with:
          ref: dev
          path: dev
      - uses: actions/checkout@v4
        with:
          ref: ryan
          path: ryan
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            main/pnpm-lock.yaml
            dev/pnpm-lock.yaml
            ryan/pnpm-lock.yaml
      - name: Build production (main)
        working-directory: main
        run: |
          pnpm install --frozen-lockfile
          pnpm exec tsc -b
          pnpm exec vite build --base "/${{ github.event.repository.name }}/app/"
      - name: Build development (dev)
        working-directory: dev
        run: |
          pnpm install --frozen-lockfile
          pnpm exec tsc -b
          pnpm exec vite build --base "/${{ github.event.repository.name }}/dev/"
      - name: Build Ryan (ryan)
        working-directory: ryan
        run: |
          pnpm install --frozen-lockfile
          pnpm exec tsc -b
          pnpm exec vite build --base "/${{ github.event.repository.name }}/ryan/"
      - name: Assemble combined site
        run: |
          mkdir site
          # Root redirect + old-SW retirement. Prefer the triggering branch's copy when
          # multiple checkouts have pages-root (later copies overwrite earlier ones).
          if [ -d main/pages-root ]; then cp -r main/pages-root/. site/; fi
          if [ -d ryan/pages-root ]; then cp -r ryan/pages-root/. site/; fi
          if [ -d dev/pages-root ]; then cp -r dev/pages-root/. site/; fi
          mkdir -p site/app site/dev site/ryan
          cp -r main/dist/. site/app/
          cp -r dev/dist/. site/dev/
          cp -r ryan/dist/. site/ryan/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Overlapping pushes can leave a Pages deployment stuck "in progress" even after
      # Actions marks the job green. Cancel known zombies, then retry create a few times.
      - name: Clear stuck Pages lock
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          for id in 26902381dc1310f69e605950a5b428e3c2360a2f; do
            echo "Cancel pages deployment $id"
            gh api -X POST "repos/${{ github.repository }}/pages/deployments/${id}/cancel"
            gh api "repos/${{ github.repository }}/pages/deployments/${id}" || true
          done
          sleep 10
      - id: deployment
        uses: actions/deploy-pages@v4
