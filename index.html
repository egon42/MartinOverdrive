<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="0; url=app/" />
    <title>Overdrive Setlist</title>
    <script>
      // Preserve query (?sync= / ?follow=) and hash (#/show/…) when bouncing old
      // root bookmarks and home-screen icons to the production /app/ install.
      (function () {
        var target = new URL('app/', location.href)
        target.search = location.search
        target.hash = location.hash
        location.replace(target.href)
      })()
    </script>
  </head>
  <body>
    <p><a href="app/">Open Overdrive</a></p>
  </body>
</html>
